version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:14-alpine
    container_name: poker_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER:-poker_user}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-poker123}
      POSTGRES_DB: ${PG_DATABASE:-poker}
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-poker_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - poker_network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: poker_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - poker_network

  # Node.js 应用服务
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: poker_app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      # 数据库配置
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: ${PG_USER:-poker_user}
      PG_PASSWORD: ${PG_PASSWORD:-poker123}
      PG_DATABASE: ${PG_DATABASE:-poker}
      # Redis 配置
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # 其他配置
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_change_this}
      SESSION_SECRET: ${SESSION_SECRET:-your_session_secret_change_this}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./public:/app/public
      - ./logs:/app/logs
    networks:
      - poker_network

  # Nginx 反向代理（可选，用于生产环境）
  nginx:
    image: nginx:alpine
    container_name: poker_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./public:/usr/share/nginx/html:ro
    depends_on:
      - app
    networks:
      - poker_network
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  poker_network:
    driver: bridge